<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas Facatativá</title>

  <style>

    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* PANEL */

    .panel{
      display:flex;
      gap:20px;
      margin-bottom:15px;
      flex-wrap:wrap;
    }

    .caja{
      background:#1c1c1c;
      padding:15px;
      border-radius:10px;
      border:1px solid #444;
      width:280px;
    }

    .caja h3{
      margin-top:0;
      color:#7dff7d;
    }

    .caja input,
    .caja select{
      width:100%;
      padding:8px;
      margin-top:8px;
      background:#222;
      border:1px solid #555;
      color:white;
      border-radius:5px;
      box-sizing:border-box;
    }

    .caja button{
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:5px;
      background:#2a7a2a;
      color:white;
      cursor:pointer;
    }

    .caja button:hover{
      opacity:0.9;
    }

    .eliminar{
      background:#a22 !important;
    }

    /* CONTROLES */

    label {
      font-size: 14px;
    }

    select {
      padding: 5px;
      font-size: 13px;
      margin: 4px;
    }

    button {
      padding: 6px 14px;
      font-size: 13px;
      margin: 4px;
      cursor: pointer;
      background: #2a7a2a;
      color: white;
      border: none;
    }

    /* MAPA */

    .mapa-wrapper {
      position: relative;
      width: 750px;
      height: 500px;
      margin-top: 10px;
      border: 1px solid #444;
    }

    .mapa-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 750px;
      height: 500px;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 750px;
      height: 500px;
    }

    #resultado {
      margin-top: 10px;
      font-size: 14px;
      color: #aaffaa;
      white-space: pre;
    }

  </style>
</head>

<body>

  <h2>Mapa de Rutas - Facatativá</h2>

  <!-- PANEL VISUAL -->

  <div class="panel">

    <div class="caja">

      <h3>Agregar Nodo</h3>

      <input type="text"
             id="nuevoId"
             placeholder="ID">

      <input type="text"
             id="nuevoNombre"
             placeholder="Nombre">

      <button onclick="agregarNodoVisual()">
        Agregar Nodo
      </button>

      <button class="eliminar"
              onclick="eliminarNodoVisual()">
        Eliminar Nodo
      </button>

    </div>


    <div class="caja">

      <h3>Agregar Conexion</h3>

      <select id="origenConexion"></select>

      <select id="destinoConexion"></select>

      <input type="number"
             id="pesoConexion"
             placeholder="Distancia">

      <button onclick="agregarConexionVisual()">
        Conectar
      </button>

    </div>

  </div>


  <!-- DIJKSTRA -->

  <label>Inicio:</label>
  <select id="inicio"></select>

  <label>Destino:</label>
  <select id="fin"></select>

  <button onclick="ejecutarDijkstra()">
    Mejor ruta
  </button>

  <button onclick="dibujar([],[])"
          style="background:#444">
    Borrar
  </button>


  <!-- MAPA -->

  <div class="mapa-wrapper">

    <img src="mapa.png" alt="Mapa Facatativá">

    <canvas id="canvas"
            width="750"
            height="500"></canvas>

  </div>

  <div id="resultado">
    Selecciona origen y destino.
  </div>


  <script src="grafo.js"></script>

  <script>

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // POSICIONES

    const posiciones = {
      "P1": { x: 400, y: 62 },
      "P2": { x: 228, y: 242 },
      "P3": { x: 448, y: 235 },
      "P4": { x: 348, y: 368 },
      "P5": { x: 480, y: 408 }
    };

    // COLORES

    const coloresNodo = {
      "P1": "#36BBA7",
      "P2": "#51A2FF",
      "P3": "#FF8904",
      "P4": "#ED6AFF",
      "P5": "#A3B3FF"
    };


    // ACTUALIZAR SELECTS

    function actualizarSelects() {

      let ids = Object.keys(mapaUrbano.vertices);

      let opciones = ids.map(id =>
        "<option value='" + id + "'>" + id + "</option>"
      ).join("");

      document.getElementById("inicio").innerHTML = opciones;
      document.getElementById("fin").innerHTML = opciones;

      document.getElementById("origenConexion").innerHTML = opciones;
      document.getElementById("destinoConexion").innerHTML = opciones;
    }


    // DIBUJAR

    function dibujar(nodosResaltados, arcosResaltados) {

      ctx.clearRect(0,0,canvas.width,canvas.height);

      // ARISTAS

      for (let id in mapaUrbano.vertices) {

        let nodo = mapaUrbano.vertices[id];
        let pos = posiciones[id];

        let arco = nodo.primerArco;

        while (arco !== null) {

          let posD = posiciones[arco.idDestino];

          let clave = id + "-" + arco.idDestino;

          let esResaltado =
            arcosResaltados.includes(clave);

          ctx.beginPath();

          ctx.moveTo(pos.x, pos.y);

          ctx.lineTo(posD.x, posD.y);

          ctx.strokeStyle =
            esResaltado ? "red" : "blue";

          ctx.lineWidth =
            esResaltado ? 3 : 1;

          ctx.stroke();

          // DISTANCIA

          let mx = (pos.x + posD.x) / 2;
          let my = (pos.y + posD.y) / 2;

          let label =
            arco.peso >= 1000
            ? (arco.peso/1000)+" km"
            : arco.peso+" m";

          ctx.fillStyle = "white";
          ctx.font = "11px Arial";

          ctx.fillText(label,mx,my-6);

          arco = arco.siguienteArco;
        }
      }


      // NODOS

      for (let id in mapaUrbano.vertices) {

        let nodo = mapaUrbano.vertices[id];

        let pos = posiciones[id];

        let esResaltado =
          nodosResaltados.includes(id);

        let color = coloresNodo[id];

        ctx.beginPath();

        ctx.arc(pos.x,pos.y,20,0,Math.PI*2);

        ctx.fillStyle =
          esResaltado ? "red" : color;

        ctx.fill();

        ctx.strokeStyle = "black";

        ctx.stroke();

        ctx.fillStyle = "white";

        ctx.font = "bold 12px Arial";

        ctx.textAlign = "center";

        ctx.fillText(nodo.id,pos.x,pos.y);

        ctx.font = "10px Arial";

        ctx.fillText(
          nodo.nombre,
          pos.x,
          pos.y + 32
        );
      }
    }


    // AGREGAR NODO

    function agregarNodoVisual() {

      let id =
        document.getElementById("nuevoId").value;

      let nombre =
        document.getElementById("nuevoNombre").value;

      if (!id || !nombre) {
        alert("Completa los datos");
        return;
      }

      mapaUrbano.agregarNodo(id,nombre);

      posiciones[id] = {
        x: Math.random()*650 + 50,
        y: Math.random()*400 + 50
      };

      coloresNodo[id] =
        "#" + Math.floor(Math.random()*16777215)
        .toString(16);

      actualizarSelects();

      dibujar([],[]);
    }


    // ELIMINAR NODO

    function eliminarNodoVisual() {

      let id =
        document.getElementById("nuevoId").value;

      delete mapaUrbano.vertices[id];

      delete posiciones[id];

      delete coloresNodo[id];

      actualizarSelects();

      dibujar([],[]);
    }


    // AGREGAR CONEXION

    function agregarConexionVisual() {

      let origen =
        document.getElementById("origenConexion").value;

      let destino =
        document.getElementById("destinoConexion").value;

      let peso =
        parseInt(
          document.getElementById("pesoConexion").value
        );

      if (!peso || peso <= 0) {
        alert("Peso invalido");
        return;
      }

      mapaUrbano.agregarArco(
        origen,
        destino,
        peso
      );

      dibujar([],[]);
    }


    // DIJKSTRA

    function ejecutarDijkstra() {

      let idInicio =
        document.getElementById("inicio").value;

      let idFin =
        document.getElementById("fin").value;

      let resultado =
        mapaUrbano.Dijkstra(idInicio,idFin);

      let arcos = [];

      for (
        let i = 0;
        i < resultado.camino.length - 1;
        i++
      ) {

        arcos.push(
          resultado.camino[i]
          + "-"
          + resultado.camino[i+1]
        );
      }

      dibujar(resultado.camino, arcos);

      document.getElementById("resultado")
      .textContent =
        "Ruta mas corta:\n"
        + resultado.camino.join(" >>> ")
        + "\nDistancia: "
        + resultado.distancia + " m";
    }


    actualizarSelects();

    dibujar([],[]);

  </script>

</body>
</html>
